<title>Japan 2026 — Reiseführer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#C0750A;
  --accent-light:rgba(192,117,10,0.1);
  --green:#1D9E75;
  --green-light:rgba(29,158,117,0.08);
  --red:#A32D2D;
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --bg3:#ebebeb;
  --text:#1a1a1a;
  --text2:#666666;
  --text3:#999999;
  --border:rgba(0,0,0,0.1);
  --border2:rgba(0,0,0,0.18);
  --radius:12px;
  --radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;
    --bg2:#2c2c2e;
    --bg3:#3a3a3c;
    --text:#f2f2f7;
    --text2:#ababab;
    --text3:#6e6e73;
    --border:rgba(255,255,255,0.1);
    --border2:rgba(255,255,255,0.18);
    --accent-light:rgba(192,117,10,0.18);
    --green-light:rgba(29,158,117,0.12);
  }
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--text);font-size:16px}
.app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto}

/* HEADER */
.header{background:var(--accent);color:#fff;padding:env(safe-area-inset-top,12px) 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-flag{font-size:22px}
.header h1{font-size:16px;font-weight:600;flex:1}
.header-date{font-size:11px;background:rgba(255,255,255,0.22);padding:3px 9px;border-radius:20px;white-space:nowrap}

/* NAV */
.nav{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:11px 15px;font-size:12px;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;font-weight:500}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.section{display:none;padding:12px 14px 80px}
.section.active{display:block}

/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text2);margin-bottom:10px}

/* ROWS */
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--border);gap:8px}
.row:last-child{border-bottom:none}
.row-label{font-size:12px;color:var(--text2);flex-shrink:0;padding-top:1px}
.row-val{font-size:12px;color:var(--text);text-align:right;font-weight:500}

/* MAPS BUTTON */
.maps-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;background:var(--accent-light);padding:4px 10px;border-radius:20px;margin-top:7px;font-weight:500}

/* SECTION HEADER */
.sec-head{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 6px;padding:0 2px}

/* TAGE */
.day-card{border-left:3px solid var(--accent);padding:10px 12px;margin-bottom:8px;background:var(--bg2);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.day-card.today{border-left-color:var(--green);background:var(--green-light)}
.day-card.past{opacity:0.55}
.day-date{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.day-card.today .day-date{color:var(--green)}
.today-pill{font-size:10px;background:var(--green);color:#fff;padding:1px 7px;border-radius:10px}
.day-text{font-size:13px;color:var(--text);line-height:1.5}
.day-sub{font-size:11px;color:var(--text2);margin-top:3px}

/* CHECKLIST */
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:var(--bg)}
.check-box.done{background:var(--green);border-color:var(--green)}
.check-text{font-size:13px;color:var(--text);flex:1;line-height:1.4}
.check-text.done{text-decoration:line-through;color:var(--text3)}
.progress-wrap{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.progress-label{font-size:13px;font-weight:600;margin-bottom:8px}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s}
.progress-info{font-size:11px;color:var(--text2);margin-top:5px}

/* HOTELS */
.hotel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hotel-name{font-size:14px;font-weight:600}
.hotel-price{font-size:12px;color:var(--green);font-weight:600}
.hotel-type{font-size:11px;color:var(--accent);font-weight:500;margin-bottom:8px}
.hotel-note{font-size:11px;color:var(--text2);line-height:1.5;margin-top:7px;padding-top:7px;border-top:0.5px solid var(--border)}

/* FLIGHTS */
.flight-leg{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px}
.leg-route{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg-ap{font-size:18px;font-weight:700;color:var(--text)}
.leg-line{flex:1;height:1px;background:var(--border2);position:relative}
.leg-line::after{content:'▶';position:absolute;right:-6px;top:-7px;font-size:10px;color:var(--text2)}
.leg-info{font-size:12px;color:var(--text2);line-height:1.6}
.leg-info strong{color:var(--accent)}
.flight-note{background:var(--accent-light);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--accent);margin-top:6px;line-height:1.5;font-weight:500}

/* RESTAURANTS & BARS */
.place-item{padding:9px 0;border-bottom:0.5px solid var(--border)}
.place-item:last-child{border-bottom:none}

const PW_KEY = 'japan2026_auth';
const CORRECT_PW = 'Japan2026';

function checkPw() {
  const input = document.getElementById('pw-input').value;
  if (input === CORRECT_PW) {
    localStorage.setItem(PW_KEY, '1');
    unlockApp();
  } else {
    document.getElementById('pw-error').textContent = 'Falsches Passwort';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function unlockApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
}

// Check if already authenticated
if (localStorage.getItem(PW_KEY) === '1') {
  unlockApp();
}

document.addEventListener('click', function(e) {
  var a = e.target.closest('a');
  if (a && a.href && a.href.startsWith('maps://')) {
    e.preventDefault();
    window.location.href = a.href;
  }
});
// ── HELPERS ────────────────────────────────────────────────────────────────
function show(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'wetter') loadWetter();
  if (id === 'yen') loadYen();
}

function maps(name, ll) {
  const url = 'maps://?q=' + encodeURIComponent(name) + '&ll=' + ll;
  return '<a class="maps-btn" href="' + url + '" onclick="openMap(event,\'' + url + '\')">📍 Apple Maps</a>';
}

function openMap(e, url) {
  e.preventDefault();
  window.location.href = url;
}

const TODAY = new Date();
const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function fmtDate(d) {
  return d.getDate() + '. ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function dayKey(dateStr) {
  // parse "12.04." as 2026
  const [d, m] = dateStr.split('.');
  return new Date(2026, parseInt(m)-1, parseInt(d)).getTime();
}

function todayKey() {
  return new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()).getTime();
}

document.getElementById('hdate').textContent = fmtDate(TODAY);

(function buildTage() {
  const el = document.getElementById('sec-tage');
  const tk = todayKey();
  let html = '';
  TAGE.forEach(t => {
    const k = dayKey(t.d);
    const isToday = k === tk;
    const isPast = k < tk;
    let cls = 'day-card';
    if(isToday) cls += ' today';
    if(isPast) cls += ' past';
    const todayBadge = isToday ? '<span class="today-pill">Heute</span>' : '';
    html += `<div class="${cls}">
      <div class="day-date">${t.e} ${t.d} — ${t.city}${todayBadge}</div>
      <div class="day-text">${t.text}</div>
      ${t.sub ? `<div class="day-sub">${t.sub}</div>` : ''}
    </div>`;
  });
  el.innerHTML = html;
})();

const ST = {};
CHECKS.forEach(c => { ST[c.id] = c.done; });

function buildChecklist() {
  const done = Object.values(ST).filter(Boolean).length;
  const total = CHECKS.length;
  const pct = Math.round(done/total*100);
  let html = `<div class="progress-wrap">
    <div class="progress-label">Vorbereitungsstand</div>
    <div class="progress-bar"><div class="progress-fill" id="pf" style="width:${pct}%"></div></div>
    <div class="progress-info" id="pi">${done} von ${total} erledigt (${pct}%)</div>
  </div>`;

  const cats = {};
  CHECKS.forEach(c => { if(!cats[c.cat]) cats[c.cat]=[]; cats[c.cat].push(c); });

  Object.entries(cats).forEach(([cat, items]) => {
    html += `<div class="sec-head">${cat}</div><div class="card" style="padding:4px 14px">`;
    items.forEach(item => {
      html += `<div class="check-item">
        <div class="check-box ${ST[item.id]?'done':''}" id="cb-${item.id}" onclick="toggle('${item.id}')">
          ${ST[item.id]?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>':''}
        </div>
        <div class="check-text ${ST[item.id]?'done':''}" id="ct-${item.id}">${item.text}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('sec-check').innerHTML = html;
}

function toggle(id) {
  ST[id] = !ST[id];
  const box = document.getElementById('cb-'+id);
  const txt = document.getElementById('ct-'+id);
  const chk = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';
  if(ST[id]) { box.classList.add('done'); box.innerHTML=chk; txt.classList.add('done'); }
  else { box.classList.remove('done'); box.innerHTML=''; txt.classList.remove('done'); }
  const done = Object.values(ST).filter(Boolean).length;
  const total = CHECKS.length;
  const pct = Math.round(done/total*100);
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pi').textContent = `${done} von ${total} erledigt (${pct}%)`;
}

  let html = `<div class="progress-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="progress-label">Packliste</div>
      <div style="font-size:12px;color:var(--text2)">${done} / ${total}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pack-fill" style="width:${pct}%"></div></div>
    <div class="progress-info" id="pack-info">${pct}% gepackt</div>
  </div>`;

  PACK_CATS.forEach((cat, ci) => {
    html += `<div class="sec-head">${cat.cat}</div><div class="card" style="padding:4px 14px">`;
    cat.items.forEach((item, ii) => {
      const key = `p_${ci}_${ii}`;
      const checked = PACK_STATE[key] || false;
      const isWarning = item.startsWith('⚠️');
      html += `<div class="check-item">
        <div class="check-box ${checked ? 'done' : ''}" id="pb-${key}" onclick="togglePack('${key}')">
          ${checked ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>' : ''}
        </div>
        <div class="check-text ${checked ? 'done' : ''}" id="pt-${key}" style="${isWarning && !checked ? 'color:var(--accent);font-weight:500' : ''}">${item}</div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('sec-packliste').innerHTML = html;
}

function togglePack(key) {
  PACK_STATE[key] = !PACK_STATE[key];

  const box = document.getElementById('pb-' + key);
  const txt = document.getElementById('pt-' + key);
  const chk = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';

  if (PACK_STATE[key]) {
    box.classList.add('done');
    box.innerHTML = chk;
    txt.classList.add('done');
    txt.style.color = '';
    txt.style.fontWeight = '';
  } else {
    box.classList.remove('done');
    box.innerHTML = '';
    txt.classList.remove('done');
    const isWarning = txt.textContent.startsWith('⚠️');
    if (isWarning) { txt.style.color = 'var(--accent)'; txt.style.fontWeight = '500'; }
  }

  // Save state
  try { localStorage.setItem('pack_state', JSON.stringify(PACK_STATE)); } catch(e) {}

  // Update progress
  const total = PACK_CATS.reduce((s, c) => s + c.items.length, 0);
  const done = Object.values(PACK_STATE).filter(Boolean).length;
  const pct = Math.round(done / total * 100);
  const fill = document.getElementById('pack-fill');
  const info = document.getElementById('pack-info');
  if (fill) fill.style.width = pct + '%';
  if (info) info.textContent = pct + '% gepackt';
}

// City per travel date
const REISE_CITIES = [
  {von:'2026-04-10', bis:'2026-04-11', city:'Frankfurt',  lat:50.11,  lon:8.68},
  {von:'2026-04-12', bis:'2026-04-15', city:'Tokio',      lat:35.68,  lon:139.69},
  {von:'2026-04-15', bis:'2026-04-18', city:'Hiroshima',  lat:34.40,  lon:132.46},
  {von:'2026-04-18', bis:'2026-04-21', city:'Kyoto',      lat:35.01,  lon:135.76},
  {von:'2026-04-21', bis:'2026-04-24', city:'Osaka',      lat:34.69,  lon:135.50},
  {von:'2026-04-24', bis:'2026-04-26', city:'Hakone',     lat:35.23,  lon:139.05},
  {von:'2026-04-26', bis:'2026-05-05', city:'Tokio',      lat:35.68,  lon:139.69},
];

const WI = {
  0:'☀️',1:'☀️',2:'⛅',3:'☁️',
  45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',
  71:'🌨️',73:'🌨️',75:'🌨️',
  80:'🌦️',81:'🌧️',82:'⛈️',
  95:'⛈️',96:'⛈️',99:'⛈️',
};

const WD = {
  0:'Klar',1:'Überwiegend klar',2:'Teilweise bewölkt',3:'Bewölkt',
  45:'Neblig',48:'Neblig',
  51:'Leichter Nieselregen',53:'Nieselregen',55:'Starker Nieselregen',
  61:'Leichter Regen',63:'Regen',65:'Starker Regen',
  71:'Leichter Schnee',73:'Schnee',75:'Starker Schnee',
  80:'Regenschauer',81:'Regenschauer',82:'Starke Regenschauer',
  95:'Gewitter',96:'Gewitter',99:'Starkes Gewitter',
};

function getCurrentCity() {
  const today = new Date().toISOString().slice(0,10);
  for (const r of REISE_CITIES) {
    if (today >= r.von && today < r.bis) return r;
  }
  return null;
}

async function loadWetter() {
  const el = document.getElementById('sec-wetter');
  const city = getCurrentCity();

  if (!city) {
    el.innerHTML = `<div class="info-block" style="text-align:center;padding:2rem">
      <div style="font-size:40px;margin-bottom:1rem">🏠</div>
      <div style="font-size:15px;font-weight:600;color:var(--text)">Nicht auf Reisen</div>
      <div style="font-size:13px;color:var(--text2);margin-top:0.5rem">Die Reise geht vom 10. April bis 5. Mai 2026.</div>
    </div>`;
    return;
  }

  el.innerHTML = `<div style="text-align:center;padding:3rem;color:var(--text2);font-size:14px">Wetter wird geladen...</div>`;

  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${city.lat}&longitude=${city.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max&hourly=temperature_2m,weathercode,precipitation_probability&timezone=auto&forecast_days=7`;
    const resp = await fetch(url);
    const data = await resp.json();

    const daily = data.daily;
    const hourly = data.hourly;

    // Find today's index
    const todayStr = new Date().toISOString().slice(0,10);
    const todayIdx = daily.time.indexOf(todayStr);

    const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];

    let html = `
      <div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:13px;color:var(--accent);font-weight:600;margin-bottom:2px">${city.city}</div>
            <div style="font-size:40px;line-height:1">${WI[daily.weathercode[todayIdx]] || '🌡️'}</div>
            <div style="font-size:13px;color:var(--text2);margin-top:4px">${WD[daily.weathercode[todayIdx]] || ''}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:36px;font-weight:300;color:var(--text)">${Math.round(daily.temperature_2m_max[todayIdx])}°</div>
            <div style="font-size:14px;color:var(--text2)">min ${Math.round(daily.temperature_2m_min[todayIdx])}°</div>
          </div>
        </div>
        <div style="display:flex;gap:16px;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)">
          <div style="font-size:12px;color:var(--text2)">💧 ${Math.round(daily.precipitation_sum[todayIdx] * 10) / 10} mm</div>
          <div style="font-size:12px;color:var(--text2)">💨 ${Math.round(daily.windspeed_10m_max[todayIdx])} km/h</div>
        </div>
      </div>`;

    // Hourly forecast for today (next 12 hours)
    const nowHour = new Date().getHours();
    const todayHourStart = daily.time.indexOf(todayStr) * 24;
    html += `<div class="sec-head">Stündlich — heute</div>
      <div class="card" style="padding:10px 14px">
        <div style="display:flex;gap:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch">`;

    for (let h = nowHour; h < Math.min(nowHour + 12, 24); h++) {
      const hi = todayHourStart + h;
      if (hi >= hourly.time.length) break;
      const timeStr = hourly.time[hi].slice(11,16);
      html += `<div style="flex-shrink:0;text-align:center;padding:4px 10px;min-width:52px">
        <div style="font-size:11px;color:var(--text2)">${timeStr}</div>
        <div style="font-size:18px;margin:3px 0">${WI[hourly.weathercode[hi]] || '🌡️'}</div>
        <div style="font-size:12px;font-weight:500;color:var(--text)">${Math.round(hourly.temperature_2m[hi])}°</div>
        <div style="font-size:10px;color:var(--text2)">${hourly.precipitation_probability ? Math.round(hourly.precipitation_probability[hi]) + '%' : ''}</div>
      </div>`;
    }
    html += `</div></div>`;

    // 7-day forecast
    html += `<div class="sec-head">7-Tage-Vorschau</div><div class="card" style="padding:4px 14px">`;
    for (let i = 0; i < daily.time.length; i++) {
      const d = new Date(daily.time[i]);
      const isToday = i === todayIdx;
      html += `<div class="row" style="${isToday ? 'font-weight:600' : ''}">
        <span class="row-label" style="min-width:32px">${isToday ? 'Heute' : days[d.getDay()]}</span>
        <span style="font-size:16px">${WI[daily.weathercode[i]] || '🌡️'}</span>
        <span class="row-label" style="flex:1;padding-left:6px;font-size:11px">${WD[daily.weathercode[i]] || ''}</span>
        <span class="row-val">${Math.round(daily.temperature_2m_min[i])}° – ${Math.round(daily.temperature_2m_max[i])}°</span>
      </div>`;
    }
    html += `</div>`;

    // All cities quick links
    html += `<div class="sec-head">Andere Reisestädte</div><div class="card" style="padding:4px 14px">`;
    REISE_CITIES.forEach(c => {
      if (c.city !== city.city || c.von !== city.von) {
        html += `<div class="place-item">
          <div class="place-name">${c.city}</div>
          <div class="place-desc">${c.von} – ${c.bis}</div>
        </div>`;
      }
    });
    html += `</div>`;

    el.innerHTML = html;

  } catch(e) {
    el.innerHTML = `<div class="info-block" style="text-align:center;padding:2rem">
      <div style="font-size:40px;margin-bottom:1rem">📡</div>
      <div style="font-size:14px;color:var(--text)">Keine Internetverbindung</div>
      <div style="font-size:12px;color:var(--text2);margin-top:0.5rem">Wetterdaten benötigen Internet.</div>
    </div>`;
  }
}

  const el = document.getElementById('sec-yen');
  el.innerHTML = `
    <div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

          <div style="font-size:13px;color:var(--text2);margin-bottom:2px">Aktueller Kurs</div>

        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:16px;color:var(--text2)">¥</span>
          <input type="number" id="yen-input" placeholder="0" inputmode="decimal"
            style="flex:1;padding:10px;font-size:20px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);outline:none;-webkit-appearance:none"
            oninput="calcYenToEur()"/>
          <span style="font-size:16px;color:var(--text2)">→</span>
          <div style="flex:1;padding:10px;font-size:20px;font-weight:600;color:var(--accent);background:var(--bg2);border-radius:var(--radius-sm);border:1.5px solid var(--border);text-align:right" id="eur-result">€ —</div>
        </div>
      </div>
    </div>

    <div class="sec-head">Schnellreferenz</div>

    document.getElementById('rate-display').textContent = `1 € = ¥ ${Math.round(YEN_RATE)}`;

    amounts.forEach(eur => {

}

function calcEurToYen() {
  if (!YEN_RATE) return;
  const eur = parseFloat(document.getElementById('eur-input').value);
  const res = document.getElementById('yen-result');
  if (isNaN(eur) || eur === 0) { res.textContent = '¥ —'; return; }
  res.textContent = '¥ ' + Math.round(eur * YEN_RATE).toLocaleString('de-DE');
}

function calcYenToEur() {
  if (!YEN_RATE) return;
  const yen = parseFloat(document.getElementById('yen-input').value);
  const res = document.getElementById('eur-result');
  if (isNaN(yen) || yen === 0) { res.textContent = '€ —'; return; }
  res.textContent = '€ ' + (yen / YEN_RATE).toFixed(2).replace('.', ',');
}
