<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Japan 2026">
<title>Japan 2026 — Reiseführer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#C0750A;
  --accent-light:rgba(192,117,10,0.1);
  --green:#1D9E75;
  --green-light:rgba(29,158,117,0.08);
  --red:#A32D2D;
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --bg3:#ebebeb;
  --text:#1a1a1a;
  --text2:#666666;
  --text3:#999999;
  --border:rgba(0,0,0,0.1);
  --border2:rgba(0,0,0,0.18);
  --radius:12px;
  --radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;
    --bg2:#2c2c2e;
    --bg3:#3a3a3c;
    --text:#f2f2f7;
    --text2:#ababab;
    --text3:#6e6e73;
    --border:rgba(255,255,255,0.1);
    --border2:rgba(255,255,255,0.18);
    --accent-light:rgba(192,117,10,0.18);
    --green-light:rgba(29,158,117,0.12);
  }
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--text);font-size:16px}
.app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto}

/* HEADER */
.header{background:var(--accent);color:#fff;padding:env(safe-area-inset-top,12px) 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-flag{font-size:22px}
.header h1{font-size:16px;font-weight:600;flex:1}
.header-date{font-size:11px;background:rgba(255,255,255,0.22);padding:3px 9px;border-radius:20px;white-space:nowrap}

/* NAV */
.nav{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:11px 15px;font-size:12px;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;font-weight:500}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.section{display:none;padding:12px 14px 80px}
.section.active{display:block}

/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text2);margin-bottom:10px}

/* ROWS */
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--border);gap:8px}
.row:last-child{border-bottom:none}
.row-label{font-size:12px;color:var(--text2);flex-shrink:0;padding-top:1px}
.row-val{font-size:12px;color:var(--text);text-align:right;font-weight:500}

/* MAPS BUTTON */
.maps-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;background:var(--accent-light);padding:4px 10px;border-radius:20px;margin-top:7px;font-weight:500}

/* SECTION HEADER */
.sec-head{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 6px;padding:0 2px}

/* TAGE */
.day-card{border-left:3px solid var(--accent);padding:10px 12px;margin-bottom:8px;background:var(--bg2);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.day-card.today{border-left-color:var(--green);background:var(--green-light)}
.day-card.past{opacity:0.55}
.day-date{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.day-card.today .day-date{color:var(--green)}
.today-pill{font-size:10px;background:var(--green);color:#fff;padding:1px 7px;border-radius:10px}
.day-text{font-size:13px;color:var(--text);line-height:1.5}
.day-sub{font-size:11px;color:var(--text2);margin-top:3px}

/* CHECKLIST */
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:var(--bg)}
.check-box.done{background:var(--green);border-color:var(--green)}
.check-text{font-size:13px;color:var(--text);flex:1;line-height:1.4}
.check-text.done{text-decoration:line-through;color:var(--text3)}
.progress-wrap{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.progress-label{font-size:13px;font-weight:600;margin-bottom:8px}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s}
.progress-info{font-size:11px;color:var(--text2);margin-top:5px}

/* HOTELS */
.hotel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hotel-name{font-size:14px;font-weight:600}
.hotel-price{font-size:12px;color:var(--green);font-weight:600}
.hotel-type{font-size:11px;color:var(--accent);font-weight:500;margin-bottom:8px}
.hotel-note{font-size:11px;color:var(--text2);line-height:1.5;margin-top:7px;padding-top:7px;border-top:0.5px solid var(--border)}

/* FLIGHTS */
.flight-leg{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px}
.leg-route{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg-ap{font-size:18px;font-weight:700;color:var(--text)}
.leg-line{flex:1;height:1px;background:var(--border2);position:relative}
.leg-line::after{content:'▶';position:absolute;right:-6px;top:-7px;font-size:10px;color:var(--text2)}
.leg-info{font-size:12px;color:var(--text2);line-height:1.6}
.leg-info strong{color:var(--accent)}
.flight-note{background:var(--accent-light);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--accent);margin-top:6px;line-height:1.5;font-weight:500}

/* RESTAURANTS & BARS */
.place-item{padding:9px 0;border-bottom:0.5px solid var(--border)}
.place-item:last-child{border-bottom:none}
.place-name{font-size:13px;font-weight:600;margin-bottom:2px}
.place-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* INFOS */
.info-block{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px}
.info-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
.info-text{font-size:13px;color:var(--text);line-height:1.6}
.emergency{background:rgba(163,45,45,0.06);border:0.5px solid rgba(163,45,45,0.25);border-radius:var(--radius-sm);padding:12px 13px;margin-bottom:8px}
.emergency-title{font-size:11px;font-weight:600;color:var(--red);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.emergency-nums{display:flex;gap:16px;flex-wrap:wrap}
.e-num{font-size:18px;font-weight:700;color:var(--red)}
.e-label{font-size:10px;color:var(--text2);margin-top:1px}
.booking-code{font-family:ui-monospace,monospace;font-size:15px;font-weight:700;letter-spacing:3px;color:var(--accent)}

.lock-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:2rem}
.lock-flag{font-size:60px;margin-bottom:1rem}
.lock-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:0.5rem}
.lock-sub{font-size:14px;color:var(--text2);margin-bottom:2rem;text-align:center}
.lock-input{width:100%;max-width:280px;padding:14px 16px;font-size:18px;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);text-align:center;letter-spacing:3px;margin-bottom:1rem;outline:none}
.lock-input:focus{border-color:var(--accent)}
.lock-btn{width:100%;max-width:280px;padding:14px;font-size:16px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer}
.lock-error{font-size:13px;color:#A32D2D;margin-top:0.5rem;min-height:20px}
</style>
</head>
<body>
<div id="lock-screen" class="lock-screen">
  <div class="lock-flag">🇯🇵</div>
  <div class="lock-title">Japan 2026</div>
  <div class="lock-sub">Reiseführer · Uwe, Sven & Chris</div>
  <input class="lock-input" type="password" id="pw-input" placeholder="Passwort" onkeydown="if(event.key==='Enter')checkPw()"/>
  <button class="lock-btn" onclick="checkPw()">Öffnen</button>
  <div class="lock-error" id="pw-error"></div>
</div>
<div class="app" id="main-app" style="display:none">
  <div class="header">
    <div class="header-flag">🇯🇵</div>
    <h1>Japan 2026</h1>
    <div class="header-date" id="hdate">Apr 2026</div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="show('tage',this)">Tage</button>
    <button class="nav-btn" onclick="show('check',this)">Checkliste</button>
    <button class="nav-btn" onclick="show('hotels',this)">Hotels</button>
    <button class="nav-btn" onclick="show('fluege',this)">Flüge</button>
    <button class="nav-btn" onclick="show('essen',this)">Essen</button>
    <button class="nav-btn" onclick="show('manami',this)">Manamis Tipps</button>
    <button class="nav-btn" onclick="show('bars',this)">Bars</button>
    <button class="nav-btn" onclick="show('karte',this)">Karte</button>
    <button class="nav-btn" onclick="show('infos',this)">Infos</button>
  </div>
  <div class="content">
    <div class="section active" id="sec-tage"></div>
    <div class="section" id="sec-check"></div>
    <div class="section" id="sec-hotels"></div>
    <div class="section" id="sec-fluege"></div>
    <div class="section" id="sec-essen"></div>
    <div class="section" id="sec-manami"></div>
    <div class="section" id="sec-bars"></div>
    <div class="section" id="sec-karte"></div>
    <div class="section" id="sec-infos"></div>
  </div>
</div>

<script>

const PW_KEY = 'japan2026_auth';
const CORRECT_PW = 'Japan2026';

function checkPw() {
  const input = document.getElementById('pw-input').value;
  if (input === CORRECT_PW) {
    localStorage.setItem(PW_KEY, '1');
    unlockApp();
  } else {
    document.getElementById('pw-error').textContent = 'Falsches Passwort';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function unlockApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
}

// Check if already authenticated
if (localStorage.getItem(PW_KEY) === '1') {
  unlockApp();
}

document.addEventListener('click', function(e) {
  var a = e.target.closest('a');
  if (a && a.href && a.href.startsWith('maps://')) {
    e.preventDefault();
    window.location.href = a.href;
  }
});
// ── HELPERS ────────────────────────────────────────────────────────────────
function show(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  btn.classList.add('active');
}

function maps(name, ll) {
  const url = 'maps://?q=' + encodeURIComponent(name) + '&ll=' + ll;
  return '<a class="maps-btn" href="' + url + '" onclick="openMap(event,\'' + url + '\')">📍 Apple Maps</a>';
}

function openMap(e, url) {
  e.preventDefault();
  window.location.href = url;
}

const TODAY = new Date();
const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function fmtDate(d) {
  return d.getDate() + '. ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function dayKey(dateStr) {
  // parse "12.04." as 2026
  const [d, m] = dateStr.split('.');
  return new Date(2026, parseInt(m)-1, parseInt(d)).getTime();
}

function todayKey() {
  return new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()).getTime();
}

document.getElementById('hdate').textContent = fmtDate(TODAY);

  {d:'16.04.',city:'Hiroshima',e:'☮️',text:'Peace Memorial Park & Museum (mindestens halber Tag!), A-Bomb Dome. Emotional intensiv — danach bewusste Pause. Nachmittag Hondori Shopping Street. Abends Seafood & Izakaya.',sub:'Hiroshima Peace Memorial Park · Danach: durchatmen'},

  {d:'18.04.',city:'Miyajima → Kyoto',e:'⛩️',text:'Früh: Miyajima (Itsukushima-Schrein, Torii — Gezeiten beachten!). Hirsche auf der Insel passen auf! Gepäck per Takkyubin vorausschicken. Nozomi 42 ab 16:22 → Kyoto 17:59, Wagen 5, Pl. 18A/18B/18C.',sub:'¥35.220 · Res. Nr. 2002 · Kyoto Tokyu Hotel'},
  {d:'19.04.',city:'Kyoto',e:'🏯',text:'Higashiyama: Kiyomizu-dera früh starten (Holzterrasse, Weitblick)! Sannenzaka & Ninenzaka (Souvenirs, Süßigkeiten). Gion Nachmittag. Philosopher\'s Path → Ginkaku-ji. Abends Pontocho Izakaya.',sub:'Teezeremonie heute oder morgen buchen'},
  {d:'20.04.',city:'Kyoto',e:'🦊',text:'Fushimi Inari so früh wie möglich (je früher desto leerer!). Kinkaku-ji & Ryoan-ji (ca. 30 Min. Bus). Nishiki-Markt nachmittags (schließt 17-18 Uhr!). Abends Gion / Pontocho.',sub:'Kinkaku-ji öffnet 9:00 · Ryoan-ji 15 Gehmin. entfernt'},

  {d:'26.04.',city:'Hakone → Tokio 2',e:'🚃',text:'Limousine ab Kinnotake 10:45 → Hakone-Yumoto (¥3.300). Romancecar GSE Hakone 6 ab 11:38 → Shinjuku 13:05, Wagen 7, Front Observation Deck, Sitze 12B/12C/12D. Check-in Stoke Villa ab 16:00.',sub:'MK Tokyo Stay (Stoke Villa) · Oki (Superhost) · kein Aufzug'},

  {d:'29.04.',city:'Tokio',e:'🎸',text:'Shimokitazawa: Vintage-Shops, Indie-Platten, Cafés (Tokios Hipster-Hub). Nakameguro Kanal & Daikanyama: Tsutaya Books (eine der schönsten Buchhandlungen der Welt!). Abend: Live Music.',sub:'Nakameguro liegt zwischen Shibuya & Shimokitazawa'},

(function buildTage() {
  const el = document.getElementById('sec-tage');
  const tk = todayKey();
  let html = '';
  TAGE.forEach(t => {
    const k = dayKey(t.d);
    const isToday = k === tk;
    const isPast = k < tk;
    let cls = 'day-card';
    if(isToday) cls += ' today';
    if(isPast) cls += ' past';
    const todayBadge = isToday ? '<span class="today-pill">Heute</span>' : '';
    html += `<div class="${cls}">
      <div class="day-date">${t.e} ${t.d} — ${t.city}${todayBadge}</div>

const ST = {};
CHECKS.forEach(c => { ST[c.id] = c.done; });

function buildChecklist() {
  const done = Object.values(ST).filter(Boolean).length;
  const total = CHECKS.length;
  const pct = Math.round(done/total*100);
  let html = `<div class="progress-wrap">
    <div class="progress-label">Vorbereitungsstand</div>
    <div class="progress-bar"><div class="progress-fill" id="pf" style="width:${pct}%"></div></div>
    <div class="progress-info" id="pi">${done} von ${total} erledigt (${pct}%)</div>
  </div>`;

  const cats = {};
  CHECKS.forEach(c => { if(!cats[c.cat]) cats[c.cat]=[]; cats[c.cat].push(c); });

  Object.entries(cats).forEach(([cat, items]) => {
    html += `<div class="sec-head">${cat}</div><div class="card" style="padding:4px 14px">`;
    items.forEach(item => {
      html += `<div class="check-item">
        <div class="check-box ${ST[item.id]?'done':''}" id="cb-${item.id}" onclick="toggle('${item.id}')">
          ${ST[item.id]?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>':''}
        </div>
        <div class="check-text ${ST[item.id]?'done':''}" id="ct-${item.id}">${item.text}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('sec-check').innerHTML = html;
}

function toggle(id) {
  ST[id] = !ST[id];
  const box = document.getElementById('cb-'+id);
  const txt = document.getElementById('ct-'+id);
  const chk = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';
  if(ST[id]) { box.classList.add('done'); box.innerHTML=chk; txt.classList.add('done'); }
  else { box.classList.remove('done'); box.innerHTML=''; txt.classList.remove('done'); }
  const done = Object.values(ST).filter(Boolean).length;
  const total = CHECKS.length;
  const pct = Math.round(done/total*100);
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pi').textContent = `${done} von ${total} erledigt (${pct}%)`;
}
