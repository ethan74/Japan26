<title>Japan 2026 — Reiseführer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#C0750A;
  --accent-light:rgba(192,117,10,0.1);
  --green:#1D9E75;
  --green-light:rgba(29,158,117,0.08);
  --red:#A32D2D;
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --bg3:#ebebeb;
  --text:#1a1a1a;
  --text2:#666666;
  --text3:#999999;
  --border:rgba(0,0,0,0.1);
  --border2:rgba(0,0,0,0.18);
  --radius:12px;
  --radius-sm:8px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1e;
    --bg2:#2c2c2e;
    --bg3:#3a3a3c;
    --text:#f2f2f7;
    --text2:#ababab;
    --text3:#6e6e73;
    --border:rgba(255,255,255,0.1);
    --border2:rgba(255,255,255,0.18);
    --accent-light:rgba(192,117,10,0.18);
    --green-light:rgba(29,158,117,0.12);
  }
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;color:var(--text);font-size:16px}
.app{display:flex;flex-direction:column;height:100%;max-width:500px;margin:0 auto}

/* HEADER */
.header{background:var(--accent);color:#fff;padding:env(safe-area-inset-top,12px) 16px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-flag{font-size:22px}
.header h1{font-size:16px;font-weight:600;flex:1}
.header-date{font-size:11px;background:rgba(255,255,255,0.22);padding:3px 9px;border-radius:20px;white-space:nowrap}

/* NAV */
.nav{display:flex;overflow-x:auto;border-bottom:0.5px solid var(--border);background:var(--bg);flex-shrink:0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;padding:11px 15px;font-size:12px;border:none;background:none;color:var(--text2);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;font-weight:500}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0}
.section{display:none;padding:12px 14px 80px}
.section.active{display:block}

/* CARDS */
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text2);margin-bottom:10px}

/* ROWS */
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid var(--border);gap:8px}
.row:last-child{border-bottom:none}
.row-label{font-size:12px;color:var(--text2);flex-shrink:0;padding-top:1px}
.row-val{font-size:12px;color:var(--text);text-align:right;font-weight:500}

/* MAPS BUTTON */
.maps-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--accent);text-decoration:none;background:var(--accent-light);padding:4px 10px;border-radius:20px;margin-top:7px;font-weight:500}

/* SECTION HEADER */
.sec-head{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin:14px 0 6px;padding:0 2px}

/* TAGE */
.day-card{border-left:3px solid var(--accent);padding:10px 12px;margin-bottom:8px;background:var(--bg2);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.day-card.today{border-left-color:var(--green);background:var(--green-light)}
.day-card.past{opacity:0.55}
.day-date{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.day-card.today .day-date{color:var(--green)}
.today-pill{font-size:10px;background:var(--green);color:#fff;padding:1px 7px;border-radius:10px}
.day-text{font-size:13px;color:var(--text);line-height:1.5}
.day-sub{font-size:11px;color:var(--text2);margin-top:3px}

/* CHECKLIST */
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.check-item:last-child{border-bottom:none}
.check-box{width:20px;height:20px;border:1.5px solid var(--border2);border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;background:var(--bg)}
.check-box.done{background:var(--green);border-color:var(--green)}
.check-text{font-size:13px;color:var(--text);flex:1;line-height:1.4}
.check-text.done{text-decoration:line-through;color:var(--text3)}
.progress-wrap{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:10px}
.progress-label{font-size:13px;font-weight:600;margin-bottom:8px}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px}
.progress-fill{height:100%;background:var(--green);border-radius:3px;transition:width 0.3s}
.progress-info{font-size:11px;color:var(--text2);margin-top:5px}

/* HOTELS */
.hotel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.hotel-name{font-size:14px;font-weight:600}
.hotel-price{font-size:12px;color:var(--green);font-weight:600}
.hotel-type{font-size:11px;color:var(--accent);font-weight:500;margin-bottom:8px}
.hotel-note{font-size:11px;color:var(--text2);line-height:1.5;margin-top:7px;padding-top:7px;border-top:0.5px solid var(--border)}

/* FLIGHTS */
.flight-leg{background:var(--bg2);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px}
.leg-route{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.leg-ap{font-size:18px;font-weight:700;color:var(--text)}
.leg-line{flex:1;height:1px;background:var(--border2);position:relative}
.leg-line::after{content:'▶';position:absolute;right:-6px;top:-7px;font-size:10px;color:var(--text2)}
.leg-info{font-size:12px;color:var(--text2);line-height:1.6}
.leg-info strong{color:var(--accent)}
.flight-note{background:var(--accent-light);border-radius:var(--radius-sm);padding:9px 11px;font-size:11px;color:var(--accent);margin-top:6px;line-height:1.5;font-weight:500}

/* RESTAURANTS & BARS */
.place-item{padding:9px 0;border-bottom:0.5px solid var(--border)}
.place-item:last-child{border-bottom:none}

<script>

const PW_KEY = 'japan2026_auth';
const CORRECT_PW = 'Japan2026';

function checkPw() {
  const input = document.getElementById('pw-input').value;
  if (input === CORRECT_PW) {
    localStorage.setItem(PW_KEY, '1');
    unlockApp();
  } else {
    document.getElementById('pw-error').textContent = 'Falsches Passwort';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}

function unlockApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'flex';
}

// Check if already authenticated
if (localStorage.getItem(PW_KEY) === '1') {
  unlockApp();
}

document.addEventListener('click', function(e) {
  var a = e.target.closest('a');
  if (a && a.href && a.href.startsWith('maps://')) {
    e.preventDefault();
    window.location.href = a.href;
  }
});
// ── HELPERS ────────────────────────────────────────────────────────────────
buildTransport();

function show(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'wetter') loadWetter();
  if (id === 'transport') buildTransport();
  if (id === 'yen') loadYen();
  if (id === 'quiz' && quizOrder.length === 0) initQuiz();
  if (id === 'lernkarten' && flashOrder.length === 0) initFlash();
}

function maps(name, ll) {
  const url = 'maps://?q=' + encodeURIComponent(name) + '&ll=' + ll;
  return '<a class="maps-btn" href="' + url + '" onclick="openMap(event,\'' + url + '\')">📍 Apple Maps</a>';
}

function openMap(e, url) {
  e.preventDefault();
  window.location.href = url;
}

const TODAY = new Date();
const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function fmtDate(d) {
  return d.getDate() + '. ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function dayKey(dateStr) {
  // parse "12.04." as 2026
  const [d, m] = dateStr.split('.');
  return new Date(2026, parseInt(m)-1, parseInt(d)).getTime();
}

function todayKey() {
  return new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()).getTime();
}

document.getElementById('hdate').textContent = fmtDate(TODAY);

(function buildCountdown() {
  const ABFLUG = new Date('2026-04-11T09:30:00');
  const now = new Date();
  const diff = ABFLUG - now;
  return; // countdown now in buildHome
  let countHTML = '';
  if (diff > 0) {
    const days = Math.floor(diff / (1000*60*60*24));
    const hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
    countHTML = `<div class="countdown-box">
      <div style="font-size:11px;opacity:0.8;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.1em">Abflug nach Japan</div>
      <div class="countdown-num">${days}</div>
      <div class="countdown-label">Tage noch · ${hours} Stunden</div>
      <div style="font-size:11px;opacity:0.7;margin-top:6px">11. April 2026 · AY1412 FRA→HEL 11:30</div>
    </div>`;
  } else if (diff > -23*24*60*60*1000) {
    countHTML = `<div class="countdown-box" style="background:linear-gradient(135deg,#1D9E75,#085041)">
      <div style="font-size:22px;margin-bottom:4px">🇯🇵</div>
      <div style="font-size:16px;font-weight:600">Ihr seid in Japan!</div>
      <div style="font-size:12px;opacity:0.8;margin-top:4px">Genießt jeden Moment</div>
    </div>`;
  } else {
    countHTML = `<div class="countdown-box" style="background:linear-gradient(135deg,#444,#222)">
      <div style="font-size:22px;margin-bottom:4px">🏠</div>
      <div style="font-size:14px;font-weight:600">Zurück in Deutschland</div>
      <div style="font-size:12px;opacity:0.8;margin-top:4px">Was für eine Reise!</div>
    </div>`;
  }
  el.innerHTML = countHTML;
})();

(function buildTage() {
  const el = document.getElementById('sec-tage');
  const tk = todayKey();
  let html = '';
  TAGE.forEach(t => {
    const k = dayKey(t.d);
    const isToday = k === tk;
    const isPast = k < tk;
    let cls = 'day-card';
    if(isToday) cls += ' today';
    if(isPast) cls += ' past';
    const todayBadge = isToday ? '<span class="today-pill">Heute</span>' : '';
    html += `<div class="${cls}">
      <div class="day-date">${t.e} ${t.d} — ${t.city}${todayBadge}</div>

const ST = {};
CHECKS.forEach(c => { ST[c.id] = c.done; });

function buildChecklist() {
  const done = Object.values(ST).filter(Boolean).length;
  const total = CHECKS.length;
  const pct = Math.round(done/total*100);
  let html = `<div class="progress-wrap">
    <div class="progress-label">Vorbereitungsstand</div>
    <div class="progress-bar"><div class="progress-fill" id="pf" style="width:${pct}%"></div></div>
    <div class="progress-info" id="pi">${done} von ${total} erledigt (${pct}%)</div>
  </div>`;

  const cats = {};
  CHECKS.forEach(c => { if(!cats[c.cat]) cats[c.cat]=[]; cats[c.cat].push(c); });

  Object.entries(cats).forEach(([cat, items]) => {
    html += `<div class="sec-head">${cat}</div><div class="card" style="padding:4px 14px">`;
    items.forEach(item => {
      html += `<div class="check-item">
        <div class="check-box ${ST[item.id]?'done':''}" id="cb-${item.id}" onclick="toggle('${item.id}')">
          ${ST[item.id]?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>':''}
        </div>
        <div class="check-text ${ST[item.id]?'done':''}" id="ct-${item.id}">${item.text}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('sec-check').innerHTML = html;
}

function toggle(id) {
  ST[id] = !ST[id];
  const box = document.getElementById('cb-'+id);
  const txt = document.getElementById('ct-'+id);
  const chk = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';
  if(ST[id]) { box.classList.add('done'); box.innerHTML=chk; txt.classList.add('done'); }
  else { box.classList.remove('done'); box.innerHTML=''; txt.classList.remove('done'); }
  const done = Object.values(ST).filter(Boolean).length;
  const total = CHECKS.length;
  const pct = Math.round(done/total*100);
  document.getElementById('pf').style.width = pct+'%';
  document.getElementById('pi').textContent = `${done} von ${total} erledigt (${pct}%)`;
}

const PACK_STATE = {};

(function buildPackliste() {
  // Load saved state
  try {
    const saved = JSON.parse(localStorage.getItem('pack_state') || '{}');
    Object.assign(PACK_STATE, saved);
  } catch(e) {}

  renderPackliste();
})();

function renderPackliste() {
  const total = PACK_CATS.reduce((s, c) => s + c.items.length, 0);
  const done = Object.values(PACK_STATE).filter(Boolean).length;
  const pct = Math.round(done / total * 100);

  let html = `<div class="progress-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div class="progress-label">Packliste</div>
      <div style="font-size:12px;color:var(--text2)">${done} / ${total}</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pack-fill" style="width:${pct}%"></div></div>
    <div class="progress-info" id="pack-info">${pct}% gepackt</div>
  </div>`;

  PACK_CATS.forEach((cat, ci) => {
    html += `<div class="sec-head">${cat.cat}</div><div class="card" style="padding:4px 14px">`;
    cat.items.forEach((item, ii) => {
      const key = `p_${ci}_${ii}`;
      const checked = PACK_STATE[key] || false;
      const isWarning = item.startsWith('⚠️');
      html += `<div class="check-item">
        <div class="check-box ${checked ? 'done' : ''}" id="pb-${key}" onclick="togglePack('${key}')">
          ${checked ? '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>' : ''}
        </div>
        <div class="check-text ${checked ? 'done' : ''}" id="pt-${key}" style="${isWarning && !checked ? 'color:var(--accent);font-weight:500' : ''}">${item}</div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('sec-packliste').innerHTML = html;
}

function togglePack(key) {
  PACK_STATE[key] = !PACK_STATE[key];

  const box = document.getElementById('pb-' + key);
  const txt = document.getElementById('pt-' + key);
  const chk = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';

  if (PACK_STATE[key]) {
    box.classList.add('done');
    box.innerHTML = chk;
    txt.classList.add('done');
    txt.style.color = '';
    txt.style.fontWeight = '';
  } else {
    box.classList.remove('done');
    box.innerHTML = '';
    txt.classList.remove('done');
    const isWarning = txt.textContent.startsWith('⚠️');
    if (isWarning) { txt.style.color = 'var(--accent)'; txt.style.fontWeight = '500'; }
  }

  // Save state
  try { localStorage.setItem('pack_state', JSON.stringify(PACK_STATE)); } catch(e) {}

  // Update progress
  const total = PACK_CATS.reduce((s, c) => s + c.items.length, 0);
  const done = Object.values(PACK_STATE).filter(Boolean).length;
  const pct = Math.round(done / total * 100);
  const fill = document.getElementById('pack-fill');
  const info = document.getElementById('pack-info');
  if (fill) fill.style.width = pct + '%';
  if (info) info.textContent = pct + '% gepackt';
}

function calcEurToYen() {
  if (!YEN_RATE) return;
  const eur = parseFloat(document.getElementById('eur-input').value);
  const res = document.getElementById('yen-result');
  if (isNaN(eur) || eur === 0) { res.textContent = '¥ —'; return; }
  res.textContent = '¥ ' + Math.round(eur * YEN_RATE).toLocaleString('de-DE');
}

function calcYenToEur() {
  if (!YEN_RATE) return;
  const yen = parseFloat(document.getElementById('yen-input').value);
  const res = document.getElementById('eur-result');
  if (isNaN(yen) || yen === 0) { res.textContent = '€ —'; return; }
  res.textContent = '€ ' + (yen / YEN_RATE).toFixed(2).replace('.', ',');
}

function saveNote(key) {
  const val = document.getElementById(key).value;
  try {
    localStorage.setItem(key, val);
    const s = document.getElementById('saved-' + key);
    if(s) { s.textContent = '✓ Gespeichert'; setTimeout(() => s.textContent = '', 2000); }
  } catch(e) {}
}

// ── QUIZ ───────────────────────────────────────────────────────────────────
const QUIZ_FRAGEN = [
  // ── KULTUR & ALLTAG ────────────────────────────────────────────────────
  {f:'Was bedeutet "Inemuri" auf Japanisch?', a:'Das Einschlafen in der Öffentlichkeit – gilt als Zeichen von Fleiß. Wer im Meeting schläft, hat offensichtlich so hart gearbeitet, dass er erschöpft ist.'},
  {f:'Wie viele Knöpfe hat eine typische japanische Toilette durchschnittlich?', a:'7 Knöpfe – manche bis zu 17. Einer spielt Meeresrauschen ab, damit niemand hört was man macht.'},
  {f:'Was bedeutet "Kawaii" wörtlich?', a:'"Liebenswürdig" oder "süß". Japan hat sogar offizielle "Kawaii-Botschafterinnen" im Außenministerium – Kawaii ist offizielle Außenpolitik.'},
  {f:'Was ist ein "Konbini" und was kann man dort alles machen?', a:'Convenience Store (7-Eleven, FamilyMart, Lawson). Man kann dort Steuern zahlen, Konzerttickets kaufen, Pakete verschicken, drucken, faxen und frisch kochen lassen – alles 24/7.'},
  {f:'Warum hat Japan mehr Haustierkatzen als Kinder unter 15?', a:'Ca. 9,5 Mio. Hauskatzen vs. ca. 15 Mio. Kinder – die Katzen holen auf. Es gibt Katzen-Cafés, Katzen-Züge und eine Katzeninsel (Aoshima) mit 120 Katzen und 6 Menschen.'},
  {f:'Was ist "Hanami" und wann findet es statt?', a:'Hanami (花見) = "Blüten schauen". Japaner picknicken unter blühenden Kirschbäumen. Stattfindet im Frühling (März-April). Die ganze Nation plant Urlaub nach der offiziellen Sakura-Vorhersage.'},
  {f:'Was ist der Unterschied zwischen Sushi und Sashimi?', a:'Sushi = immer mit gewürztem Reis (nicht zwingend Fisch). Sashimi = nur rohes Fleisch/Fisch, kein Reis. Ein vegetarisches Sushi ist genauso echter Sushi wie eines mit Thunfisch.'},
  {f:'Was bedeutet "Otaku" in Japan?', a:'Ursprünglich abwertend für Menschen mit extremen Hobbys (Anime, Manga, Spiele). Heute eher neutral oder sogar stolz verwendet. Akihabara ist das weltweite Zentrum der Otaku-Kultur.'},
  {f:'Was ist "Wabi-Sabi"?', a:'Japanische Ästhetik der Unvollkommenheit und Vergänglichkeit. Schönheit im Unvollständigen, Asymmetrischen, Vergänglichen. Erklärt warum gesprungenes Geschirr mit Goldlack repariert wird (Kintsugi).'},
  {f:'Was ist Kintsugi?', a:'Die Kunst, zerbrochenes Keramik mit Goldlack zu reparieren. Die Bruchstellen werden sichtbar gemacht – die Geschichte des Objekts wird Teil seiner Schönheit. Metapher für Heilung durch Akzeptanz.'},

  // ── ESSEN & TRINKEN ────────────────────────────────────────────────────
  {f:'Welche Erfindung wurde in Japan zur wichtigsten des 20. Jahrhunderts gewählt?', a:'Instant-Ramen! Schlug in einer Umfrage Karaoke, den Walkman und das Faxgerät. Erfinder Momofuku Ando aß täglich Chicken Ramen bis zu seinem Tod mit 96 Jahren.'},
  {f:'Was ist der Unterschied zwischen Ramen und Udon?', a:'Ramen = dünne Weizennudeln in Brühe (Shoyu, Miso, Tonkotsu oder Shio). Udon = dicke, weiche Weizennudeln, milder Geschmack. Soba = Buchweizennudeln, eigene Kategorie.'},
  {f:'Was ist Kaiseki?', a:'Die höchste Form japanischer Kochkunst – 8-12 Gänge, saisonal, lokal. Nicht Opulenz sondern Reduktion. Jeder Gang im handgefertigten Geschirr zur Jahreszeit. Ihr habt es im Kinnotake Ryokan!'},
  {f:'Warum ist Kit Kat in Japan so beliebt?', a:'"Kit Kat" klingt wie "Kitto Katsu" – "Du wirst sicher gewinnen". Studenten essen sie vor Prüfungen. Über 300 Sorten: Matcha, Sake, Wasabi, Apfelkuchen, Käsekuchen...'},
  {f:'Was ist Takoyaki?', a:'Teigkugeln mit Oktopusstücken, Ingwer und Lauch – klassisches Osaka-Streetfood. Werden auf einer speziellen Gusseisenplatte mit halbkugelförmigen Mulden gebacken und gewendet.'},
  {f:'Was ist Umami?', a:'Der fünfte Grundgeschmack – herzhaft-würzig, jenseits von süß/sauer/salzig/bitter. Entdeckt 1908 von Prof. Kikunae Ikeda. Dashi, Miso und Sojasauce sind reich daran.'},
  {f:'Was bedeutet "Itadakimasu" und wann sagt man es?', a:'Vor dem Essen – bedeutet "Ich empfange demütig". Dankbarkeit für Essen, Tiere und Menschen die es zubereitet haben. Pflicht in Japan, auch beim Alleinessen.'},
  {f:'Was ist Wagyu und warum ist es so teuer?', a:'Japanisches Rind (wa=Japan, gyu=Rind) mit extremer Fettmarmorierung. Rinder hören Musik, trinken Bier, bekommen Massagen. Ein Kobe-Steak kann 500€+ kosten.'},
  {f:'Was ist der Unterschied zwischen Sake und Shochu?', a:'Sake = Reiswein (15-20% Alk.), aus fermentiertem Reis. Shochu = Destillat (25-35% Alk.), aus Süßkartoffeln, Gerste oder Reis. Beide sind typisch japanisch, aber sehr verschieden.'},
  {f:'Was ist Matcha und warum ist er so grün?', a:'Fein gemahlener Grüntee. Teepflanzen werden vor der Ernte 3-4 Wochen beschattet – das erhöht Chlorophyll und Aminosäuren (L-Theanin). Daher der intensive Grünton.'},
  {f:'Was ist ein "Izakaya"?', a:'Japanische Kneipe/Gasthaus – zwischen Restaurant und Bar. Man sitzt, trinkt und isst kleine Gerichte (Yakitori, Edamame, Karaage). Der ideale Ort für einen entspannten Abend.'},
  {f:'Was ist Yudofu?', a:'Zart gekochter Tofu in klarer Brühe mit Beilagen – Kyoto-Spezialität. Okutan Nanzen-ji (seit 1635) ist das berühmteste Restaurant dafür. Ihr habt eine Tischreservierung geplant!'},
  {f:'Darf man in Japan beim Gehen essen?', a:'Grundsätzlich gilt es als unhöflich – außer bei Straßenfesten (Matsuri) und Märkten. Takoyaki und Eis sind Ausnahmen. In Shinkansen darf man essen, aber Bento-Duft ist akzeptiert.'},
  {f:'Was ist Natto und warum mögen es viele Ausländer nicht?', a:'Fermentierte Sojabohnen – klebrig, fadenziehend, stark riechendes Frühstücksgericht. Reich an Vitaminen und Proteinen. Die Textur und der Geruch sind für viele Nicht-Japaner gewöhnungsbedürftig.'},

  // ── TRANSPORT & SHINKANSEN ─────────────────────────────────────────────
  {f:'Welche durchschnittliche Verspätung hat der Shinkansen pro Jahr?', a:'54 Sekunden pro Jahr! Die Deutsche Bahn gilt ab unter 6 Minuten als pünktlich. 2017 entschuldigte sich ein Zugbetreiber offiziell für eine 20-Sekunden-Frühfahrt.'},
  {f:'Was bedeutet "Shinkansen" wörtlich?', a:'"Neue Stammstrecke" (Shin=neu, kan=Stamm/Hauptlinie, sen=Strecke/Linie). Nicht "Bullet Train" – das ist der englische Spitzname wegen der Wagenform.'},
  {f:'Wann wurde der erste Shinkansen eröffnet?', a:'1964 – pünktlich zu den Olympischen Spielen in Tokio. Strecke Tokio-Osaka, 515 km in 4 Stunden. Heute schafft der Nozomi dieselbe Strecke in 2 Std. 22 Min.'},
  {f:'Was ist der Unterschied zwischen Nozomi, Hikari und Kodama?', a:'Nozomi = schnellster, wenige Halte (kein JR Pass!). Hikari = mittelschnell, mehr Halte. Kodama = langsamster, alle Halte. Ihr fahrt Nozomi und Kodama!'},
  {f:'Was ist eine Suica-Karte und wofür kann man sie nutzen?', a:'Aufladbare IC-Card für alle U-Bahnen, Busse und Züge (außer Shinkansen-Reservierungen). Auch zum Bezahlen in Konbinis und Automaten. Funktioniert in Apple Wallet!'},
  {f:'Was ist der Romancecar?', a:'Luxuszug der Odakyu-Linie von Shinjuku nach Hakone. Panoramafenster, Frontbeobachtungsdeck, Reservierungspflicht. Ihr fahrt den GSE (70000er) – der neueste und schönste.'},
  {f:'Was ist Takkyubin?', a:'Japanischer Haushalts-Gepäckversand (Yamato Transport). Koffer abends abgeben, am nächsten Tag im Zielhotel. Ihr nutzt ihn am 18.04. und 26.04. – ca. 1.500-2.000 Yen/Koffer.'},
  {f:'Welche drei Zuglinien fahren am Bahnhof Takadanobaba?', a:'JR Yamanote Line (grün, Ringbahn), Tozai U-Bahn (blau, West-Ost) und Seibu Shinjuku Line (gelb). Euer Airbnb liegt 6 Gehminuten davon entfernt.'},

  // ── GESCHICHTE & GEOGRAFIE ─────────────────────────────────────────────
  {f:'Wie viele Inseln hat Japan?', a:'Über 6.800 Inseln – aber nur 421 davon sind bewohnt. Die vier Hauptinseln sind Honshu, Hokkaido, Kyushu und Shikoku.'},
  {f:'Auf wie vielen tektonischen Platten liegt Japan?', a:'Drei Platten gleichzeitig: Eurasische, Pazifische und Philippinische Platte. Deshalb: 111 aktive Vulkane (10% aller weltweit) und täglich kleine Erdbeben.'},
  {f:'Was war Edo und was ist es heute?', a:'Edo war die Hauptstadt der Tokugawa-Shogune (1603-1868). 1868 umbenannt in Tokio ("Östliche Hauptstadt") als Kaiser Meiji die Macht übernahm.'},
  {f:'Was ist die Goldene Woche?', a:'Japans längster Feiertag – Ende April bis Anfang Mai, 7-10 Tage. Mehrere nationale Feiertage hintereinander. Züge und Hotels sind Monate im Voraus ausgebucht – ihr seid mittendrin!'},
  {f:'Wann wurde Hiroshima durch die Atombombe zerstört?', a:'6. August 1945 – "Little Boy" explodierte 580 Meter über der Stadt. Über 80.000 Menschen starben sofort. Nagasaki folgte 3 Tage später. Japan kapitulierte am 15. August.'},
  {f:'Was war das Tokugawa-Shogunat?', a:'Militärregierung (1603-1868) unter Ieyasu Tokugawa. Japan war 250 Jahre lang praktisch vom Ausland abgeschlossen (Sakoku). Friedliche, stabile Epoche – Basis der japanischen Kultur.'},
  {f:'Was ist die Meiji-Restauration?', a:'1868: Kaiser Meiji übernahm Macht vom Shogunat zurück. Japan öffnete sich dem Westen, industrialisierte rasant. In 50 Jahren von Feudalstaat zur Weltmacht.'},
  {f:'Warum heißt Japan auf Japanisch "Nihon"?', a:'"Nihon" (日本) = "Ursprung der Sonne" – Japan liegt östlich von China, wo die Sonne aufgeht. Der englische Name "Japan" kommt vom chinesischen "Cipangu" über Marco Polo.'},
  {f:'Was ist die Bedeutung des Fuji für die Japaner?', a:'Nationalsymbol, heiliger Berg (Shinto), seit 2013 UNESCO-Welterbe als "Kulturlandschaft". Letzter Ausbruch 1707. Ca. 300.000 Menschen besteigen ihn jährlich.'},
  {f:'Welche Städte auf eurer Route sind UNESCO-Welterbe?', a:'Hiroshima Peace Memorial (Genbaku Dome), Miyajima (Itsukushima-Schrein) und Kyoto (17 Tempel und Schreine). Nara (Todai-ji) auch!'},

  // ── SEHENSWÜRDIGKEITEN & AKTIVITÄTEN ──────────────────────────────────
  {f:'Was ist Owakudani und warum sind die Eier dort schwarz?', a:'Aktives Vulkangebiet in Hakone. Schwefelmineralien im kochenden Wasser färben die Eierschale schwarz (Kuro-Tamago). Legende: jedes Ei verlängert das Leben um 7 Jahre.'},
  {f:'Warum scheint das Torii auf Miyajima im Wasser zu schweben?', a:'Steht auf Pfählen im Wattenmeer. Bei Flut schwimmt es, bei Ebbe kann man hingehen. Morgens und bei Sonnenuntergang fotografisch am stärksten.'},
  {f:'Was ist teamLab?', a:'Japanisches Kunstkollektiv das immersive digitale Installationen schafft. Borderless (Azabudai) = trocken, riesige Räume ohne Grenzen. Planets (Toyosu) = barfuß durch Wasser, 4 intensive Räume.'},
  {f:'Was ist der Unterschied zwischen teamLab Planets und Borderless?', a:'Planets (Toyosu, 13.04.) = barfuß durch Wasser, Hose hochkrempeln! 4 intensive Räume, ca. 60 Min. Borderless (Azabudai, 27.04.) = trocken, weitläufig, viele Räume ohne Ende.'},
  {f:'Was ist Fushimi Inari berühmt für?', a:'Über 10.000 orangerote Torii-Tore, die von Firmen und Privatpersonen gespendet wurden. Auf jedem Tor steht der Name des Spenders. Je früher man geht, desto leerer ist es.'},
  {f:'Was ist der Philosophenweg in Kyoto?', a:'Spazierweg entlang eines Kanals von Nanzen-ji bis Ginkaku-ji, ca. 2 km. Benannt nach Philosoph Nishida Kitaro der ihn täglich entlangging. Ende April noch mit letzten Kirschblüten möglich.'},
  {f:'Was ist das Ghibli Museum und wie kauft man Tickets?', a:'Museum für Studio Ghibli (Miyazaki) in Mitaka, bei Tokio. Tickets NUR online über Lawson Ticket (lawson.co.jp), am 1. des Vormonats ab 10 Uhr JST. Oft Monate im Voraus ausverkauft!'},
  {f:'Was ist Arashiyama bekannt für?', a:'Bambushain (vor 8 Uhr = fast leer!), Togetsukyo-Brücke, Tenryu-ji Tempel. Ruhige, zen-hafte Atmosphäre. Kombination mit Affenpark oder Bootsfahrt auf dem Fluss möglich.'},
  {f:'Was ist die Hondori Street in Hiroshima?', a:'Überdachte Einkaufsstraße im Zentrum Hiroshimas – kleine Restaurants, Bars, von casual bis modern. Gute Alternative nach dem Peace Memorial Park zum Runterkommen.'},
  {f:'Was ist Dotonbori in Osaka?', a:'Kanal mit ikonischen Leuchtreklamen – Glico-Mann und Kani-Doraku-Krabbe. Osaka-Nachtleben-Zentrum, Streetfood, Bars. Perfekt für den ersten Abend nach dem Checkin.'},

  // ── ONSEN & RYOKAN ─────────────────────────────────────────────────────
  {f:'Was sind die wichtigsten Onsen-Regeln?', a:'Körper vorher gründlich waschen. Keine Badekleidung. Kein Handy. Leise sein. Handtuch nicht ins Wasser. Tattoos in vielen Onsens verboten (Kinnotake: private Suite, kein Problem).'},
  {f:'Was ist ein "Kashikiri-Buro"?', a:'Privat buchbares Onsen – nur für eine Gruppe/Person. Kinnotake hat solche auf den Zimmern. Seltener Luxus – die meisten Onsens sind öffentlich geteilt.'},
  {f:'Was ist ein Ryokan?', a:'Traditionelles japanisches Gasthaus. Tatami-Boden, Futon auf dem Boden, Yukata als Hauskleidung, Kaiseki-Dinner. Das Kinnotake Tonosawa ist eines der exklusivsten Ryokans Japans.'},
  {f:'Was ist ein Yukata?', a:'Leichter Baumwoll-Kimono als Hauskleidung im Ryokan. Wird für Mahlzeiten, Onsen-Gang und abends getragen. Das Kinnotake stellt ihn bereit – links über rechts schließen (rechts über links = Leichensymbol!).'},
  {f:'Was ist Hakone Yuryo und warum ist es besonders?', a:'Moderner Tagesonsen direkt am Bahnhof Hakone-Yumoto. Einer der wenigen Onsens der Tattoos erlaubt. Kein Shuttle nötig, buchbar online. Alternative zum Kinnotake-Onsen.'},
  {f:'Was ist der Unterschied zwischen einem Rotenburo und einem Sentō?', a:'Rotenburo = Außenonsen (im Freien, natürliches heißes Wasser). Sentō = städtisches Badehaus (erhitztes Leitungswasser). Kinnotake hat Rotenburo – Onsen unter freiem Himmel!'},

  // ── NATUR & TIERE ──────────────────────────────────────────────────────
  {f:'Warum heißt Ōkunoshima "Rabbit Island"?', a:'Ehemalige geheime Giftgasfabrik im WWII – so geheim dass die Insel aus Karten gelöscht wurde. Nach Kriegsende wurden Labortiere freigelassen. Heute: hunderte zahme Kaninchen.'},
  {f:'Welches Tier läuft frei auf Miyajima herum und klaut Essen?', a:'Sika-Hirsche – besonders die Jungen greifen nach Snacks und Plastiktüten. Gelten als heilige Boten der Götter. Aufpassen mit Einkaufstüten!'},
  {f:'Welche Tiere sind heilig im Shintō?', a:'Füchse (Kitsune) bei Inari-Schreinen – als Botschafter des Gottes. Hirsche bei Kasuga-Taisha in Nara. Raben (Karasu Tengu) an vielen Schreinen. Auch Schlangen und Tiger.'},
  {f:'Was ist Tanuki?', a:'Marderhund – in der japanischen Folklore ein Verwandlungskünstler (Shapeshifter). Die dicken Keramikfiguren vor Restaurants und Läden sind Tanuki – sie bringen Glück und gute Geschäfte.'},
  {f:'Was ist der Kitsune in der japanischen Mythologie?', a:'Fuchs-Geist mit magischen Kräften. Je älter, desto mehr Schwänze (bis 9). Botschafter des Inari-Gottes (Ernte, Fuchs, Industrie). Fushimi Inari Schrein ist ihm gewidmet.'},

  // ── ZAHLEN & FAKTEN ────────────────────────────────────────────────────
  {f:'Wie viele Michelin-Stern-Restaurants hat Japan?', a:'Ca. 4.000 – mehr als Frankreich und Italien zusammen! Tokyo hat mehr Michelin-Sterne als jede andere Stadt der Welt. Ihr esst also statistisch gesehen überdurchschnittlich gut.'},
  {f:'Wie viele Menschen leben im Großraum Tokio?', a:'Ca. 37-38 Millionen – die größte Metropolregion der Welt. Tokio (Stadtgebiet) allein hat 14 Millionen. Zum Vergleich: ganz Australien hat 26 Millionen.'},
  {f:'Wie alt ist Japans ältestes Unternehmen?', a:'Kongō Gumi, eine Tempel-Baufirma, wurde 578 n.Chr. gegründet. 1.400 Jahre überlebt – bis 2006 von einem Konzern aufgekauft. Ironie der Geschichte.'},
  {f:'Wie hoch ist der Fuji?', a:'3.776 Meter. Letzter Ausbruch 1707 (Hōei-Eruption). Ca. 300.000 Menschen besteigen ihn jährlich (Juli-August). Alte Weisheit: "Einmal auf den Fuji steigen ist weise, zweimal ist töricht."'},
  {f:'Wie viele UNESCO-Welterbestätten hat Japan?', a:'25 Stätten (Stand 2023) – Platz 12 weltweit. Ihr besucht mehrere davon: Hiroshima Peace Memorial, Miyajima, und Kyoto (gleich 17 Tempel und Schreine auf einmal).'},
  {f:'Wie viele aktive Vulkane hat Japan?', a:'Ca. 111 aktive Vulkane – 10% aller aktiven Vulkane weltweit. Als Ausgleich: Sie erzeugen die heißen Quellen für die Onsens. Japan macht Onsen aus seiner geologischen Katastrophenlage.'},
  {f:'Was ist die Bevölkerungsdichte von Japan im Vergleich zu Deutschland?', a:'Japan: ca. 334 Einw./km². Deutschland: ca. 234 Einw./km². Aber: 73% Japans sind Gebirge – die Bevölkerung lebt auf 27% der Fläche, also effektiv über 1.200 Einw./km².'},

  // ── SPRACHE & SCHRIFT ──────────────────────────────────────────────────
  {f:'Welche drei Schriftsysteme nutzt Japanisch gleichzeitig?', a:'Hiragana (einheimische Silben, 46 Zeichen), Katakana (Fremdwörter, 46 Zeichen), Kanji (chinesischstämmige Zeichen, 2.136 Standard). Plus Romaji (lateinisch) für Touristen.'},
  {f:'Wie viele Kanji muss ein japanisches Kind für den Schulabschluss lernen?', a:'2.136 Jōyō-Kanji (Alltagskanji). Ein durchschnittlicher Japaner kennt ca. 3.000-4.000. Zeitungen verwenden ca. 2.000 verschiedene Kanji. Ein Leben lang lernen.'},
  {f:'Was bedeutet "Sumimasen" und wann ist es besonders nützlich?', a:'"Entschuldigung/Verzeihung" – aber auch der beste Weg, einen Kellner zu rufen! Einfach "Sumimasen!" rufen statt zu winken. Höflicher als Schnipsen oder Klatschen.'},
  {f:'Was bedeutet "Ikura desu ka?"', a:'"Wie viel kostet das?" – die wichtigste Einkaufs-Phrase. Einfach auf ein Objekt zeigen und fragen. Fast jeder Verkäufer versteht diese Phrase.'},
  {f:'Warum vermeiden Japaner das direkte "Nein"?', a:'Direkte Ablehnung gilt als unhöflich und gesichtswahrend (Mentsu). Stattdessen: "Es ist etwas schwierig...", "Ich werde nachdenken..." oder einfaches Schweigen. Kontext lesen ist Kunst.'},
  {f:'Was bedeutet "Kawaii", "Sugoi" und "Yabai"?', a:'Kawaii = süß/niedlich. Sugoi = großartig/wow/unglaublich. Yabai = ursprünglich "gefährlich/schlimm", heute von Jüngeren für "krass/geil/unglaublich" verwendet (positiv wie negativ).'},

  // ── SPORT & UNTERHALTUNG ──────────────────────────────────────────────
  {f:'Was ist Sumo und welche Regeln gibt es?', a:'Nationalsport Japans. Ringer (Rikishi) versuchen, den Gegner aus dem Ring (Dohyo) zu werfen oder zu boden zu bringen. Strenge Regeln und Rituale, Shinto-Wurzeln. 6 Turniere pro Jahr.'},
  {f:'Was ist Pachinko und warum ist es legal obwohl es Glücksspiel ist?', a:'Flipper-ähnliche Automaten. Man gewinnt Murmeln (kein Geld direkt). Die Murmeln tauscht man im Nachbargeschäft gegen Bargeld. Das Nachbargeschäft hat "nichts" mit dem Pachinko-Laden zu tun.'},
  {f:'Was ist Karaoke und wo wurde es erfunden?', a:'In Japan! 1971 von Daisuke Inoue in Kobe erfunden – er baute eine Maschine die zu aufgenommener Musik spielte. Inoue ließ das Konzept nie patentieren. Karaoke bedeutet "leeres Orchester".'},
  {f:'Was ist der Unterschied zwischen Manga und Anime?', a:'Manga = japanische Comics (schwarz-weiß, von rechts nach links lesen). Anime = japanische Animationsserien/-filme. Viele Anime basieren auf Manga. Akihabara ist das weltweite Zentrum beider.'},
  {f:'Was ist ein "Maid Café"?', a:'Café in dem Kellnerinnen als niedliche Zofen (Maids) verkleidet sind und Gäste als "Master" oder "Princess" ansprechen. Phänomen aus Akihabara. Eher Rollenspiel-Entertainment als Gastronomie.'},
  {f:'Was sind "Purikura"?', a:'Fotoautomaten die Bilder stark bearbeiten und verschönern – größere Augen, kleineres Gesicht, glattere Haut. Massenhaft in Spielhallen. Gruppen-Selfie-Kulisse. Sehr japanisch.'},

  // ── TOKIO SPEZIFISCH ───────────────────────────────────────────────────
  {f:'Was ist das Shibuya Scramble Crossing?', a:'Belebteste Fußgängerkreuzung der Welt – bei jeder Grünphase überqueren ca. 3.000 Menschen gleichzeitig in alle Richtungen. Bester Ausblick: Starbucks oder Shibuya Sky darüber.'},
  {f:'Was ist Golden Gai in Shinjuku?', a:'Labyrinth von ca. 200 winzigen Bars in 6 engen Gassen – jede hat Platz für 5-8 Gäste. Jede Bar hat ihr eigenes Thema (Jazz, Anime, Filmregisseure...). Seit den 60ern unverändert.'},
  {f:'Was ist Omoide Yokocho?', a:'"Gasse der Erinnerungen" in Shinjuku – enge Gasse mit winzigen Yakitori-Grillständen. Rauchig, authentisch, preiswert. Abends erinnert es an das Japan der 50er Jahre.'},
  {f:'Was ist Harajuku bekannt für?', a:'Takeshita Street = Zentrum japanischer Streetfashion und Jugendkultur. Crepes, bonbonfarbene Mode, Cosplayer. Ruhiger: Omotesando = Japans Champs-Élysées mit Designerläden.'},
  {f:'Was ist Shimokitazawa?', a:'Tokios "Hipster-Viertel" – Vintage-Shops, Indie-Plattenläden, kleine Theater, Cafés. Kein Tourismus, viele Studenten und Künstler. Entspannte Alternative zu Shibuya.'},
  {f:'Was ist Yanaka?', a:'Am besten erhaltenes altes Tokio (Shitamachi). Enge Gassen, kleine Tempel, Handwerksläden. Yanaka Ginza = kurze Einkaufsstraße mit Snacks und Souvenirs. Kaum Touristen.'},

  // ── HAKONE SPEZIFISCH ──────────────────────────────────────────────────
  {f:'Warum ist der Hakone-Rundkurs im Uhrzeigersinn empfohlen?', a:'Die meisten Touristen fahren gegen den Uhrzeigersinn (Tozan Bahn zuerst). Im Uhrzeigersinn startet man früh mit dem Bus zum Ashi-See – deutlich weniger Menschen morgens.'},
  {f:'Was ist der Hakone Freepass?', a:'2-Tages-Pass (¥6.000/Person) der alle Transportmittel im Rundkurs abdeckt: Tozan Bahn, Ropeway, Piratenschiff, Busse. Ihr habt ihn bereits gebucht (EMot)! Aktivierung beim ersten Einsteigen.'},
  {f:'Was ist das Pola Museum of Art in Hakone?', a:'Fantastische Impressionisten-Sammlung (Monet, Renoir, Cézanne) in modernem Gebäude mitten im Wald. Idealer Plan B bei schlechtem Wetter statt Rundkurs.'},
  {f:'Wie weit ist das Kinnotake Ryokan vom Bahnhof Hakone-Yumoto?', a:'1,3 km – ca. 15-20 Minuten zu Fuß. Oder ¥100 Bus ab Haltestelle Deyama (ca. 5 Minuten). Ihr habt einen Limousinen-Service gebucht für An- und Abreise.'},

  // ── KYOTO SPEZIFISCH ───────────────────────────────────────────────────
  {f:'Warum wurde Kyoto im WWII nicht bombardiert?', a:'US-Kriegsminister Henry Stimson hatte Kyoto als Kulturstätte von unschätzbarem Wert von der Atombomben-Zielliste gestrichen. Er kannte die Stadt aus seiner Hochzeitsreise 1926.'},
  {f:'Was ist der Unterschied zwischen einem Tempel und einem Schrein?', a:'Tempel (tera/ji) = buddhistische Anlage, oft mit Pagode. Schrein (jinja) = shintōistisches Heiligtum, immer mit Torii-Tor am Eingang. Japan hat beides – oft nebeneinander.'},
  {f:'Was ist Pontocho?', a:'Schmale Gasse in Kyoto parallel zum Kamo-Fluss – eines der Hauptgebiete für traditionelle Restaurants und Bars. Abends besonders atmosphärisch mit Laternen und Holzhäusern.'},
  {f:'Was ist ein "Maiko" und wo sieht man sie?', a:'Lehrlings-Geisha in Kyoto (5-6 Jahre Ausbildung zur Geiko/Geisha). In Gion häufiger zu sehen, besonders frühabends. Echte Maiko tragen aufwendige Kimonos und weiße Schminke.'},

  // ── OSAKA SPEZIFISCH ───────────────────────────────────────────────────
  {f:'Was bedeutet "Kuidaore" und warum ist es typisch für Osaka?', a:'"Sich zu Tode essen" – Osaka ist Japans Gastronomiehauptstadt. Takoyaki, Okonomiyaki, Kushikatsu stammen aus Osaka. Die Stadt hat mehr Restaurants pro Kopf als fast jede andere Stadt.'},
  {f:'Was ist Doyamachō?', a:'Japans entspanntestes LGBTQ+-Viertel in Osaka – 5 Min. von Umeda. Casually, offen, sehr touristenfreundlich. Bars und Clubs über viele Gebäude verteilt, meist ab 20 Uhr.'},
  {f:'Was ist das Glico-Mann Schild?', a:'Leuchtschild in Dotonbori seit 1935 – läufer mit erhobenen Armen als Siegerpose. Globales Symbol für Osaka. Glico ist ein japanischer Süßwarenhersteller (Pocky!). Schild wurde 6x erneuert.'},
  {f:'Was ist Kuromon Ichiba?', a:'Überdachte Markthalle nahe Namba – das kulinarische Herz Osakas. Frische Austern direkt am Stand, Wagyu-Spieße, Krabben. Bis 17 Uhr geöffnet. Als Mittagsprogramm ideal.'},

  // ── SONSTIGES ─────────────────────────────────────────────────────────
  {f:'Was ist Duty Free in Japan und wie funktioniert es ab 2026?', a:'Kauft man über ¥5.000 mit Reisepass, sind viele Waren steuerfrei. Ab Juli 2026 neue Regelung: Rückerstattung zentral am Flughafen statt im Laden. Plant das ein!'},
  {f:'Warum gibt es in Japan kaum öffentliche Mülleimer?', a:'Anti-Terror-Maßnahmen seit dem Sarin-Anschlag der Aum-Sekte in der Tokioter U-Bahn 1995. Lösung: Müll in Konbinis entsorgen – dort gibt es immer Mülleimer beim Eingang.'},
  {f:'Was ist Kōdō?', a:'Die japanische Kunst des Räucherns – "Weg des Dufts". Wie eine Teezeremonie, aber mit Räucherwerk. Gäste "hören" den Duft (kikō) anstatt ihn zu riechen. Eines der drei klassischen japanischen Künste.'},
  {f:'Was ist Ikebana?', a:'Japanische Kunst des Blumenarrangierens – nicht dekorativ sondern meditativ. Weniger ist mehr: Leere ist genauso wichtig wie das Arrangement. Über 1.000 Jahre alte Tradition.'},
  {f:'Was ist der Unterschied zwischen Shintō und Buddhismus in Japan?', a:'Viele Japaner praktizieren beide! Shintō = einheimische Naturreligion (Kami-Götter in allem). Buddhismus = aus China/Indien importiert. Hochzeit oft shintōistisch, Beerdigung buddhistisch.'},
  {f:'Was ist "Omotenashi"?', a:'Japanische Gastfreundschaft – bedingungslose, aufrichtige Fürsorge für den Gast ohne Erwartung einer Gegenleistung. Anders als westlicher Service – keine Aufführung, sondern echte Hingabe. Ihr erlebt es im Kinnotake.'},
  {f:'Was ist Ikigai?', a:'"Grund zum Aufstehen" – der Schnittpunkt aus dem was man liebt, was man gut kann, was die Welt braucht und womit man Geld verdienen kann. Japanisches Konzept für Lebenssinn. Okinawa hat die ältesten Menschen der Welt – teilweise dank Ikigai.'},
  {f:'Was ist "Ma" in der japanischen Ästhetik?', a:'"Zwischenraum" oder "Pause" – die bedeutungsvolle Leere zwischen Dingen. In Musik, Architektur, Poesie und Kampfkunst gleich wichtig wie das was vorhanden ist. Das Nichts als aktives Element.'},
  {f:'Warum tragen viele Japaner Mundmasken?', a:'Mehrere Gründe: Krankheitsschutz und -verhinderung (Höflichkeit bei Erkältung), Pollenallergie (Sugi-Zeder blüht massiv), Privatsphäre/Anonymität in der Öffentlichkeit, und mittlerweile auch Mode.'},
  {f:'Was ist das japanische Konzept "Shokunin"?', a:'"Handwerker/Meister" – jemand der sein ganzes Leben einem Handwerk widmet und ständig nach Perfektion strebt. Ein Ramen-Koch der 30 Jahre dieselbe Brühe perfektioniert ist ein Shokunin. Tiefe Bewunderung in Japan.'},
];

let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;
let quizOrder = [];

function initQuiz() {
  quizOrder = [...Array(QUIZ_FRAGEN.length).keys()].sort(() => Math.random()-0.5);
  quizIdx = 0;
  quizScore = 0;
  renderQuiz();
}

function renderQuiz() {
  const el = document.getElementById('sec-quiz');
  if (quizIdx >= quizOrder.length) {
    el.innerHTML = `<div class="quiz-card">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">Quiz beendet!</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:20px">${quizScore} von ${QUIZ_FRAGEN.length} richtig</div>
      <button class="quiz-btn" onclick="initQuiz()">Nochmal spielen</button>
    </div>`;
    return;
  }
  const q = QUIZ_FRAGEN[quizOrder[quizIdx]];
  quizAnswered = false;
  el.innerHTML = `
    <div class="score-badge">Frage ${quizIdx+1} / ${QUIZ_FRAGEN.length} · ${quizScore} Punkte</div>
    <div class="quiz-card">
      <div class="quiz-q">${q.f}</div>
      <div class="quiz-answer" id="quiz-ans">${q.a}</div>
      <button class="quiz-btn" onclick="showQuizAnswer()">Antwort zeigen</button>
    </div>`;
}

function showQuizAnswer() {
  if (quizAnswered) return;
  quizAnswered = true;
  document.getElementById('quiz-ans').style.display = 'block';
  const el = document.getElementById('sec-quiz');
  el.innerHTML += `<div style="display:flex;gap:8px;margin-top:10px">
    <button class="quiz-btn quiz-btn-ghost" style="flex:1" onclick="quizNext(false)">😅 Nein</button>
    <button class="quiz-btn" style="flex:1;background:var(--green)" onclick="quizNext(true)">✓ Ja, wusste ich!</button>
  </div>`;
}

function quizNext(correct) {
  if (correct) quizScore++;
  quizIdx++;
  renderQuiz();
}

let flashIdx = 0;
let flashFlipped = false;
let flashOrder = [];

let flashTotal = 0;

function initFlash() {
  flashOrder = [...Array(LERNKARTEN.length).keys()].sort(() => Math.random()-0.5);
  flashIdx = 0;
  flashFlipped = false;
  flashCorrect = 0;
  flashTotal = 0;
  renderFlash();
}

function renderFlash() {
  const el = document.getElementById('sec-lernkarten');
  if (flashIdx >= flashOrder.length) {
    el.innerHTML = `<div class="quiz-card">
      <div style="font-size:48px;margin-bottom:16px">🎓</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">Runde beendet!</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:20px">${flashCorrect} von ${LERNKARTEN.length} auf Anhieb gewusst</div>
      <button class="quiz-btn" onclick="initFlash()">Nochmal üben</button>
    </div>`;
    return;
  }
  const k = LERNKARTEN[flashOrder[flashIdx]];
  flashFlipped = false;
  el.innerHTML = `
    <div class="score-badge">Karte ${flashIdx+1} / ${LERNKARTEN.length}</div>
    <div class="quiz-card" onclick="flipFlash()" style="cursor:pointer;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:11px;color:var(--text2);margin-bottom:8px">🇩🇪 Deutsch — tippe zum Umdrehen</div>
      <div class="flash-front">${k.de}</div>
      <div class="flash-back" id="flash-back">
        <div style="font-size:22px;font-weight:600;color:var(--accent);margin-bottom:4px">${k.ro}</div>
        <div style="font-size:16px;color:var(--text3)">${k.jp}</div>
      </div>
    </div>
    <div id="flash-btns" style="display:none;display:flex;gap:8px;margin-top:10px">
      <button class="quiz-btn quiz-btn-ghost" style="flex:1" onclick="flashNext(false)">😅 Nochmal</button>
      <button class="quiz-btn" style="flex:1;background:var(--green)" onclick="flashNext(true)">✓ Gewusst!</button>
    </div>`;
}

function flipFlash() {
  if (flashFlipped) return;
  flashFlipped = true;
  document.getElementById('flash-back').style.display = 'block';
  document.getElementById('flash-btns').style.display = 'flex';
}

function flashNext(correct) {
  if (correct) flashCorrect++;
  flashIdx++;
  renderFlash();
}

function goTo(id) {
  // Find the nav button for this id and click it
  const btns = document.querySelectorAll('.nav-btn');
  btns.forEach(b => {
    if (b.getAttribute('onclick') && b.getAttribute('onclick').includes("'" + id + "'")) {
      show(id, b);
      // Scroll nav to show active button
      b.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
    }
  });
}
